name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Velopack's `vpk upload github` uses git history to locate
          # the previous release for delta package generation. Shallow
          # clones miss old tags so fetch-depth: 0 is required.
          fetch-depth: 0

      - name: Setup .NET
        # actions/setup-dotnet@v4 downloads the requested SDK if not
        # preinstalled on the runner, so we can target .NET 10 directly
        # even before windows-latest has it baked into the image.
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test ComeOnOverDesktopLauncher.Tests/ComeOnOverDesktopLauncher.Tests.csproj --configuration Release

      - name: Install Velopack CLI
        # `vpk` is the Velopack packaging tool. We use it to produce the
        # Setup.exe installer + full/delta .nupkg artefacts from a normal
        # dotnet publish output. Installed globally so it's on PATH.
        run: dotnet tool install -g vpk

      - name: Compute Velopack package version
        # Velopack rejects the 'v' prefix and requires semver2 — just
        # strip the 'v' from the git tag (e.g. v1.10.0 -> 1.10.0).
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaging version: $version"

      - name: Publish for Velopack packaging
        # PublishSingleFile is explicitly false because Velopack needs a
        # multi-file output (it packages individual assemblies into its
        # delta-update format). Self-contained stays true so end users
        # don't need .NET installed.
        run: |
          dotnet publish ComeOnOverDesktopLauncher/ComeOnOverDesktopLauncher.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish `
            -p:PublishSingleFile=false

      - name: Pack with Velopack
        # Produces: Setup.exe (bootstrap installer), full .nupkg (complete
        # app), delta .nupkg (diff from previous release - only present
        # from v1.10.1 onwards). Shortcuts: Desktop + StartMenu per the
        # v1.10.0 design decisions.
        run: |
          vpk pack `
            --packId ComeOnOverDesktopLauncher `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish `
            --mainExe ComeOnOverDesktopLauncher.exe `
            --packTitle "ComeOnOver Desktop Launcher" `
            --shortcuts "Desktop,StartMenu"

      - name: Upload to GitHub Releases
        # `vpk upload github` creates the GitHub release AND uploads all
        # generated artefacts (Setup.exe, *.nupkg). Replaces the old
        # softprops/action-gh-release step entirely. vpk doesn't read
        # the GITHUB_TOKEN env var automatically - it requires --token
        # explicitly.
        run: |
          vpk upload github `
            --repoUrl https://github.com/LewisIsWorking/ComeOnOverDesktopLauncher `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --publish `
            --releaseName "ComeOnOver Desktop Launcher ${{ github.ref_name }}" `
            --tag ${{ github.ref_name }}
